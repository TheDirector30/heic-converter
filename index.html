<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEIC to JPG Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" integrity="sha384-OTofQ0MEeiSgh62havBcemCIK0gqj809wX6UA0uPISNMRnR6NZyCdGzX3SbLrgwL" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 32px;
    }

    #drop-zone {
      width: 100%;
      max-width: 560px;
      border: 2px dashed #bbb;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    #drop-zone.drag-over {
      border-color: #444;
      background: #fafafa;
    }

    #drop-zone .icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    #drop-zone p {
      font-size: 1rem;
      color: #444;
      line-height: 1.5;
    }

    #drop-zone span {
      color: #222;
      font-weight: 500;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    #file-input { display: none; }

    #results {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 18px;
      border: 1px solid #e0e0e0;
    }

    .file-card .name {
      font-size: 0.88rem;
      font-weight: 500;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }

    .progress-bar-wrap {
      height: 6px;
      background: #ebebeb;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #333;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .status {
      font-size: 0.8rem;
      color: #777;
      margin-bottom: 10px;
    }

    .status.error { color: #c0392b; }
    .status.done { color: #27ae60; }

    .btn-download {
      display: inline-block;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 500;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-download:hover { background: #444; }

    #bulk-actions {
      width: 100%;
      max-width: 560px;
      margin-top: 4px;
      display: none;
    }

    #btn-zip {
      padding: 10px 22px;
      font-size: 0.88rem;
      font-weight: 500;
      background: #fff;
      color: #222;
      border: 1.5px solid #222;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #btn-zip:hover { background: #f0f0f0; }
    #btn-zip:disabled { opacity: 0.45; cursor: default; }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 12px;
      font-size: 0.78rem;
      color: #999;
      background: #f5f5f5;
      border-top: 1px solid #e8e8e8;
    }
  </style>
</head>
<body>

  <h1>HEIC to JPG</h1>
  <p class="subtitle">Convert iPhone photos instantly in your browser</p>

  <div id="drop-zone">
    <div class="icon">&#128247;</div>
    <p>Drag &amp; drop HEIC files here<br><span>or click to select files</span></p>
    <input type="file" id="file-input" accept=".heic,.heif,image/heic,image/heif" multiple />
  </div>

  <div id="bulk-actions">
    <button id="btn-zip" disabled>Download All as ZIP</button>
  </div>

  <div id="results"></div>

  <footer>All conversions happen locally in your browser. Nothing is uploaded.</footer>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const results = document.getElementById('results');
    const bulkActions = document.getElementById('bulk-actions');
    const btnZip = document.getElementById('btn-zip');

    const convertedFiles = {};
    let totalQueued = 0;
    let totalDone = 0;

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      handleFiles(fileInput.files);
      fileInput.value = '';
    });

    function handleFiles(files) {
      const list = Array.from(files);
      if (!list.length) return;

      totalQueued += list.length;
      bulkActions.style.display = totalQueued > 1 ? 'block' : 'none';

      list.forEach(convertFile);
    }

    function convertFile(file) {
      const baseName = file.name.replace(/\.(heic|heif)$/i, '');
      const outName = baseName + '.jpg';

      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <div class="name" title="${escHtml(file.name)}">${escHtml(file.name)}</div>
        <div class="progress-bar-wrap"><div class="progress-bar"></div></div>
        <div class="status">Converting…</div>
      `;
      results.prepend(card);

      const bar = card.querySelector('.progress-bar');
      const status = card.querySelector('.status');

      let pct = 0;
      const ticker = setInterval(() => {
        pct = Math.min(pct + (Math.random() * 8), 85);
        bar.style.width = pct + '%';
      }, 200);

      heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 })
        .then((result) => {
          clearInterval(ticker);
          bar.style.width = '100%';

          const blob = Array.isArray(result) ? result[0] : result;
          convertedFiles[outName] = blob;

          totalDone++;
          if (totalDone >= totalQueued) btnZip.disabled = false;

          status.textContent = 'Done';
          status.className = 'status done';

          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = outName;
          a.className = 'btn-download';
          a.textContent = 'Download JPG';
          card.appendChild(a);
        })
        .catch((err) => {
          clearInterval(ticker);
          bar.style.width = '100%';
          bar.style.background = '#c0392b';
          status.textContent = 'Failed: ' + (err.message || 'Could not convert file');
          status.className = 'status error';
          totalQueued--;
          if (totalQueued > 1 && totalDone >= totalQueued) btnZip.disabled = false;
        });
    }

    btnZip.addEventListener('click', async () => {
      btnZip.disabled = true;
      btnZip.textContent = 'Zipping…';

      const zip = new JSZip();
      for (const [name, blob] of Object.entries(convertedFiles)) {
        zip.file(name, blob);
      }

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'converted-photos.zip';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      btnZip.disabled = false;
      btnZip.textContent = 'Download All as ZIP';
    });

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
